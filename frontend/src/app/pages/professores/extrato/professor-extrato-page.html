<main class="px-5 py-10 sm:px-8 lg:py-14">
  <section class="mx-auto w-full max-w-5xl" aria-labelledby="professor-extrato-title">
    <p class="text-sm font-semibold uppercase tracking-[0.25em] text-primary-200">Extrato do professor</p>
    <h1 id="professor-extrato-title" class="mt-4 text-4xl font-bold tracking-tight text-white sm:text-5xl">
      Moedas distribuídas
    </h1>

    <div class="mt-8 space-y-4">
      @for (lancamento of lancamentosProfessor; track lancamento.id) {
        <article class="rounded-3xl border border-primary-300/15 bg-surface-900/75 p-5 shadow-xl shadow-primary-950/20">
          <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <div>
              <h2 class="text-lg font-semibold text-white">{{ lancamento.aluno }}</h2>
              <p class="mt-1 text-sm text-slate-400">{{ lancamento.motivo }} · {{ lancamento.data }}</p>
            </div>
            <strong class="text-lg text-red-300">{{ lancamento.quantidadeMoedas }} moedas</strong>
          </div>
        </article>
      }
    </div>
  </section>
</main>

server:
  servlet:
    context-path: /api/moeda-estudantil

spring:
  application:
    name: moeda-estudantil
  datasource:
    url: jdbc:sqlserver://moeda-estudantil.database.windows.net:1433;database=db-moeda-estudantil-des;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;
    username: moedaestudantil@moeda-estudantil
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect

app:
  security:
    jwt:
      issuer: moeda-estudantil
      expiration-seconds: 3600
      secret: ${JWT_SECRET:jwtsecretasdasdasdsd}
